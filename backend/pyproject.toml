# Backend Python tooling: Ruff (format + lint).
# Used by pre-commit and by running: ruff format . && ruff check --fix .

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = [".git", ".venv", "__pycache__", "build", "dist", "*.egg-info", "migrations"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade
]
ignore = ["E501"]  # line length (handled by formatter)
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
