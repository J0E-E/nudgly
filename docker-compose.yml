# Epic 1: Django API, React frontend, PostgreSQL, Redis, nginx as single entrypoint.
# From repo root: copy .env.example to .env, then: docker compose up --build
# Open http://localhost for the app; health at http://localhost/health/

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nudgly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nudgly}
      POSTGRES_DB: ${POSTGRES_DB:-nudgly}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nudgly}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django_api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,django_api}
      DATABASE_URL: postgres://${POSTGRES_USER:-nudgly}:${POSTGRES_PASSWORD:-nudgly}@postgres:5432/${POSTGRES_DB:-nudgly}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-false}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: >
      sh -c 'python manage.py migrate --noinput && gunicorn --bind 0.0.0.0:8000 --workers 1 config.wsgi:application'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - django_api

  nginx:
    image: nginx:alpine
    ports:
      - "9000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - django_api

volumes:
  postgres_data:
  redis_data:
