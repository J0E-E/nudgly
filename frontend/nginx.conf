# SPA fallback: serve index.html for non-file requests so client-side routing works.
# Required for direct navigation / refresh on paths like /login/, /register/, etc.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve existing files (JS, CSS, assets); otherwise fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
